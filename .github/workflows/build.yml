name: Android App APK Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Setup repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Get app info
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          APP_NAME=$(node -p "require('./app.json').expo.slug")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set build profile
        run: |
          if [[ "${{ github.ref_name }}" == *"beta"* ]]; then
            echo "EAS_PROFILE=preview" >> $GITHUB_ENV
          else
            echo "EAS_PROFILE=production" >> $GITHUB_ENV
          fi

      - name: Build on EAS cloud
        run: eas build --platform android --profile ${{ env.EAS_PROFILE }} --wait --non-interactive

      - name: Download APK from EAS
        run: |
          BUILD_URL=$(eas build:list --platform android --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          curl -L "$BUILD_URL" -o "${{ github.workspace }}/${{ env.APP_NAME }}_${{ env.VERSION }}.apk"

      - name: Generate changelog
        run: |
          CURRENT_TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "")
          if [ -n "$CURRENT_TAG" ]; then
            PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -1)
          else
            PREVIOUS_TAG=$(git tag --sort=-creatordate | head -1)
          fi
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/${{ env.APP_NAME }}_${{ env.VERSION }}.apk
          tag_name: v${{ env.VERSION }}
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          body: |
            ## What's Changed
            ${{ env.CHANGELOG }}
